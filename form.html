<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
</head>
<body>
    <h1>CodeMug Smart Coffee Cup - Feedback Form</h1>
    <p>Thank you for helping us improve our product!</p>
    <form action="">
        <label for="Name">Name</label>
    <input type="text" id="Name">
    <br><br>
    <label for="Email">Email</label>
    <input type="text" id="Email">
    <br>
    <p>How often do you use your CodeMug?</p>
    <input type="radio" id="Daily" name="Usage">
    <label for="Daily">Daily</label>
    <br>
    <input type="radio" id="week" name="Usage">
    <label for="week">A few times a week</label>
    <br>
    <input type="radio" id="month" name="Usage">
    <label for="month">A few times a month</label>
    <br>
    <p>Which features do you use most? (Check all that apply)</p>
    <input type="checkbox" id="temp" name="Feature">
    <label for="temp">Temperature Control</label>
    <br>
    <input type="checkbox" id="mobile" name="Feature">
    <label for="mobile">Mobile App Integration</label>
    <br>
    <input type="checkbox" id="LED" name="Feature">
    <label for="LED">LED Display</label>
    <br>
    <p>Overall,how satisfied are you with the CodeMug?</p>
    <select name="" id="">
        <option value="very-satisfied">Very Satisfied</option>
        <option value="satisfied">Satisfied</option>
        <option value="neutral">Neutral</option>
        <option value="unsatisfied">Unsatisfied</option>
    </select>
    <p>Do you have any suggestions for improvement?</p>
    <textarea name="" id=""></textarea>
    <br>
    <input type="submit" value="Submit Feedback">
    </form>
</body>
</html>
